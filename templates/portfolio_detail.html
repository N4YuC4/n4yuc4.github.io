{% extends "base.html" %}

{% block title %}{{ item.title }} - N4YuC4{% endblock %}

{% block content %}
<article class="bg-white p-8 md:p-12 rounded-xl shadow-lg border border-gray-100 relative">
    <div class="mb-8">
        <a href="/portfolio.html" class="text-sky-400 hover:text-sky-300 font-semibold mb-4 inline-block transition duration-300">&larr; Back to Portfolio</a>
        <h1 class="text-3xl md:text-5xl font-bold text-gray-800 mb-4">{{ item.title }}</h1>
        <img src="/static/{{ item.imageUrl }}" alt="{{ item.title }} image" class="w-full h-auto object-cover rounded-lg mb-6 shadow-md">
    </div>

    <div class="prose prose-lg prose-slate mx-auto text-slate-700">
        {{ item.content | safe }}
    </div>
</article>
{% endblock %}
