{% extends "base.html" %}

{% block title %}Publications - N4YuC4{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-10">
    <h2 class="text-4xl font-bold text-gray-800 mb-8 text-center">Publications</h2>
    {% for item in items %}
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 flex flex-col hover:shadow-xl transition-shadow duration-300">
        <h3 class="text-2xl font-bold text-gray-800 mb-2">
            <a href="{{ item.link }}" target="_blank" class="hover:text-purple-600 transition-colors duration-300">
                {{ item.title }}
            </a>
        </h3>
        <div class="text-purple-600 font-semibold mb-4">
            {{ item.authors }} ({{ item.year }})
        </div>
        <div class="text-gray-600 italic mb-4">
            {{ item.journal }}
        </div>
        <p class="text-gray-700 mb-6 leading-relaxed">
            {{ item.abstract }}
        </p>
        <div class="mt-auto">
            <a href="{{ item.link }}" target="_blank" class="read-more-btn inline-block py-2 px-6 rounded-full font-semibold shadow-md transition duration-300 text-sm">
                <i class="fas fa-external-link-alt mr-2"></i> View Publication
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
