{% extends "base.html" %}
{% import "_macros.html" as macros with context %}

{% block title %}{{ data.title }} - N4YuC4{% endblock %}

{% block content %}
<section id="about-section" class="container mx-auto p-6 md:p-8 bg-white rounded-xl shadow-lg flex-grow">
    <div class="max-w-3xl mx-auto text-center">
    <img src="/static/{{ data.profileImageUrl }}" alt="User profile picture" class="rounded-full w-40 h-40 object-cover mx-auto mb-6 shadow-md border-4 border-sky-400">
        <h1 class="text-3xl md:text-5xl font-bold text-gray-800 mb-6">{{ data.title }}</h1>
        <div class="text-lg text-gray-700 leading-relaxed content-area-text">
            {{ data.content | safe }}
        </div>
        <div class="mt-8 flex justify-center space-x-6">
            {{ macros.social_links_list(socialLinks.links) }}
        </div>
        <div class="mt-8 flex justify-center">
            {{ macros.cv_download_button() }}
        </div>
    </div>
</section>
{% endblock %}
